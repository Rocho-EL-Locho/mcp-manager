name: Release

# Bei einem neuen Tag (v1.2.3) das Linux-Bundle bauen und ans Release hängen.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # Actions auf feste Commit-SHAs gepinnt (Supply-Chain-Härtung).
      # Dependabot (github-actions) hält sie per PR aktuell; Kommentar = Version.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            build-essential \
            file

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build bundles and attach to release
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # linuxdeploy ist selbst ein AppImage -> ohne FUSE2 auf CI extrahieren.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "mcp-manager ${{ github.ref_name }}"
          releaseBody: "Automatischer Build. Das AppImage und das .deb hängen unten als Assets."
          releaseDraft: false
          prerelease: false
          args: "--bundles appimage deb"

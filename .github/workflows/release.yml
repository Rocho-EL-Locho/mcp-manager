name: Release

# Bei einem neuen Tag (v1.2.3) das Linux-Bundle bauen und ans Release hängen.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            build-essential \
            file

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build bundles and attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # linuxdeploy ist selbst ein AppImage -> ohne FUSE2 auf CI extrahieren.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "mcp-manager ${{ github.ref_name }}"
          releaseBody: "Automatischer Build. Das AppImage und das .deb hängen unten als Assets."
          releaseDraft: false
          prerelease: false
          args: "--bundles appimage deb"
